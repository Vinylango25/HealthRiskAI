[phases.setup]
nixPkgs = ["python310"]

[phases.install]
cmds = [
  "pip install --upgrade pip",
  "pip install fastapi==0.111.0 uvicorn[standard]==0.30.1 httpx==0.27.0 python-dotenv==1.0.1 pydantic==2.7.4 numpy==1.26.4 pandas==2.2.2 scikit-learn==1.5.1 xgboost==2.1.0 loguru==0.7.2 requests==2.32.3"
]

[start]
cmd = "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
