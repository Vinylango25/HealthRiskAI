name: HealthRisk AI CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.10"
  POETRY_VERSION: "1.8.3"

jobs:
  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-
            ${{ runner.os }}-pip-

      - name: Install linting tools
        run: |
          pip install --upgrade pip
          pip install ruff==0.5.1 mypy==1.10.1

      - name: Run Ruff linter
        run: ruff check . --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check .

      - name: Run mypy type checking
        run: |
          mypy data/ models/ financial/ simulation/ explainability/ \
            --ignore-missing-imports \
            --no-error-summary \
            || true   # non-fatal until type coverage improves

  # ── Test ───────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-
            ${{ runner.os }}-pip-

      - name: Install test dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install \
            pandas==2.2.2 \
            numpy==1.26.4 \
            scipy==1.13.1 \
            scikit-learn==1.5.1 \
            statsmodels==0.14.2 \
            xgboost==2.1.0 \
            lightgbm==4.4.0 \
            lifelines==0.29.0 \
            shap==0.45.1 \
            requests==2.32.3 \
            httpx==0.27.0 \
            python-dotenv==1.0.1 \
            pyyaml==6.0.1 \
            loguru==0.7.2 \
            pytest==8.2.2 \
            pytest-cov==5.0.0 \
            pytest-asyncio==0.23.7 \
            faker \
            plotly==5.22.0

      - name: Create .env for tests
        run: |
          cp .env.example .env
          echo "ENVIRONMENT=testing" >> .env

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            -m "not integration and not slow and not gpu" \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=50

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: healthrisk-ai-coverage
          fail_ci_if_error: false

  # ── Docker Build ───────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: healthrisk-ai:ci-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Smoke test — verify container starts
        run: |
          # Start container in background
          docker run -d \
            --name healthrisk-smoke \
            -p 8000:8000 \
            -e ENVIRONMENT=testing \
            -e DATABASE_URL=sqlite:///test.db \
            -e MLFLOW_TRACKING_URI=http://localhost:5000 \
            healthrisk-ai:ci-${{ github.sha }} \
            python -c "print('HealthRisk AI container OK'); import sys; sys.exit(0)"

          # Wait briefly then check exit code
          sleep 5
          EXIT_CODE=$(docker inspect healthrisk-smoke --format='{{.State.ExitCode}}')
          echo "Container exit code: $EXIT_CODE"
          docker logs healthrisk-smoke
          docker rm -f healthrisk-smoke
          [ "$EXIT_CODE" = "0" ] && echo "Smoke test passed" || (echo "Smoke test failed" && exit 1)

      - name: Clean up Docker image
        if: always()
        run: docker rmi healthrisk-ai:ci-${{ github.sha }} || true
